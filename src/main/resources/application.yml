spring:
  datasource:
    url: jdbc:postgresql://xxx/xxx
    username:
    password:
    driver-class-name: org.postgresql.Driver
  application:
    name: insurance-ai-agent
  ai:
    vectorstore:
      pgvector:
        index-type: HNSW
        dimensions: 1024 # 嵌入向量的维度
        distance-type: COSINE_DISTANCE
        max-document-batch-size: 10000
    # ai-api
    dashscope:
      api-key: 
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1024

      chat:
        options:
          model: qwen3-max

server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.hi.insurance_agent.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    root: info

